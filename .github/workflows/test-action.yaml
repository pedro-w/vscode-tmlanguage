name: Install and Test

on: [push]

jobs:
  build:

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
      - run: npm install -g @vscode/vsce
      - run: vsce package

